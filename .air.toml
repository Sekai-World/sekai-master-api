root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/main ./cmd/api"
bin = "./tmp/air/main"
full_bin = "APP_ENV=development ./tmp/air/main"
include_ext = ["go", "env"]
exclude_dir = ["tmp", "bin", ".git", ".devcontainer"]
exclude_file = []
exclude_regex = ["_test\\.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "cyan"
watcher = "yellow"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true
