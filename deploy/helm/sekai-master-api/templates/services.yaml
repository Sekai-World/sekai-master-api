{{- range $component := list "serve" "control" }}
{{- $role := index $.Values $component }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sekai-master-api.fullname" $ }}-{{ $component }}
  labels:
    {{- include "sekai-master-api.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ $role.service.type }}
  ports:
    - name: http
      port: {{ $role.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sekai-master-api.selectorLabels" (dict "Chart" $.Chart "Release" $.Release "Values" $.Values "component" $component) | nindent 4 }}
{{- end }}
