services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sekai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sekai"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - dev

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dev

  loki:
    image: grafana/loki:3.6.7
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - -verify-config
        - -config.file=/etc/loki/local-config.yaml
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - dev

  tempo:
    build:
      context: ../..
      dockerfile: deploy/compose/tempo/Dockerfile
    image: sekai/tempo-dev:2.8.2
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - tempo-data:/var/tempo
    networks:
      - dev

  otel-collector:
    build:
      context: ../..
      dockerfile: deploy/compose/otel-collector/Dockerfile
    image: sekai/otel-collector-dev:0.141.0
    restart: unless-stopped
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
    depends_on:
      tempo:
        condition: service_started
    networks:
      - dev

  prometheus:
    build:
      context: ../..
      dockerfile: deploy/compose/prometheus/Dockerfile
    image: sekai/prometheus-dev:v2.53.5
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - dev

  keycloak:
    build:
      context: ../..
      dockerfile: deploy/keycloak/Dockerfile
    image: sekai/keycloak-dev:${KEYCLOAK_VERSION:-26.5.4}
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT:-18081}
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_PORT:-18081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

  grafana:
    build:
      context: ../..
      dockerfile: deploy/compose/grafana/Dockerfile
    image: sekai/grafana-dev:12.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dev

volumes:
  pg-data:
  prometheus-data:
  tempo-data:

networks:
  dev:
    name: sekai-dev
