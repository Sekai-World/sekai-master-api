services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sekai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sekai"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - dev

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dev

  loki:
    image: grafana/loki:3.6.7
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    healthcheck:
      test:
        - CMD
        - /usr/bin/loki
        - -verify-config
        - -config.file=/etc/loki/local-config.yaml
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - dev

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2026.2.2}
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-local-authentik-secret-key-change-me}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-sekai}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-postgres}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__CACHE_DB: ${AUTHENTIK_REDIS_CACHE_DB:-1}
      AUTHENTIK_REDIS__MESSAGE_QUEUE_DB: ${AUTHENTIK_REDIS_MESSAGE_QUEUE_DB:-2}
      AUTHENTIK_REDIS__WS_DB: ${AUTHENTIK_REDIS_WS_DB:-3}
      AUTHENTIK_REDIS__OUTPOST_SESSION_DB: ${AUTHENTIK_REDIS_OUTPOST_SESSION_DB:-4}
    ports:
      - "${AUTHENTIK_PORT:-19100}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-19443}:9443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - ak
        - healthcheck
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 90s
    volumes:
      - authentik-media:/data
    networks:
      - dev

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2026.2.2}
    command: worker
    restart: unless-stopped
    user: "0"
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-local-authentik-secret-key-change-me}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB:-sekai}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER:-postgres}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS:-postgres}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__CACHE_DB: ${AUTHENTIK_REDIS_CACHE_DB:-1}
      AUTHENTIK_REDIS__MESSAGE_QUEUE_DB: ${AUTHENTIK_REDIS_MESSAGE_QUEUE_DB:-2}
      AUTHENTIK_REDIS__WS_DB: ${AUTHENTIK_REDIS_WS_DB:-3}
      AUTHENTIK_REDIS__OUTPOST_SESSION_DB: ${AUTHENTIK_REDIS_OUTPOST_SESSION_DB:-4}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@sekai.localhost}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-Admin123!Admin123!}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN:-sekai-local-bootstrap-token}
      AUTHENTIK_LOCAL_APP_SLUG: ${AUTHENTIK_LOCAL_APP_SLUG:-sekai-admin-web}
      AUTHENTIK_LOCAL_APP_NAME: ${AUTHENTIK_LOCAL_APP_NAME:-Sekai Admin Web}
      AUTHENTIK_LOCAL_CLIENT_ID: ${AUTHENTIK_LOCAL_CLIENT_ID:-sekai-admin-web}
      AUTHENTIK_LOCAL_REDIRECT_URI: ${AUTHENTIK_LOCAL_REDIRECT_URI:-http://localhost:8080/api/v1/admin/login/callback}
      AUTHENTIK_LOCAL_TEST_USERNAME: ${AUTHENTIK_LOCAL_TEST_USERNAME:-admin}
      AUTHENTIK_LOCAL_TEST_NAME: ${AUTHENTIK_LOCAL_TEST_NAME:-Sekai Admin}
      AUTHENTIK_LOCAL_TEST_EMAIL: ${AUTHENTIK_LOCAL_TEST_EMAIL:-admin@sekai.localhost}
      AUTHENTIK_LOCAL_TEST_PASSWORD: ${AUTHENTIK_LOCAL_TEST_PASSWORD:-Admin123!Admin123!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - ak
        - healthcheck
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 90s
    volumes:
      - authentik-media:/data
    networks:
      - dev

  grafana:
    build:
      context: ../..
      dockerfile: deploy/compose/grafana/Dockerfile
    image: sekai/grafana-dev:12.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - -q
        - -O
        - /dev/null
        - http://127.0.0.1:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dev

volumes:
  pg-data:
  authentik-media:

networks:
  dev:
    name: sekai-dev
