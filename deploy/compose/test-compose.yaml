services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sekai
      POSTGRES_USER: sekai
      POSTGRES_PASSWORD: sekai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sekai"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    build:
      context: ../..
      dockerfile: deploy/keycloak/Dockerfile
    image: sekai/keycloak-test:26.5.4
    restart: unless-stopped
    command:
      - start-dev
      - --http-port=8081
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "${KEYCLOAK_PORT:-8081}:8081"

  loki:
    image: grafana/loki:3.6.7
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"

  grafana:
    build:
      context: ../..
      dockerfile: deploy/compose/grafana/Dockerfile
    image: sekai/grafana-dev:12.4.0
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - loki

volumes:
  pg-data:
