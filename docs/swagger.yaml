basePath: /api/v1
definitions:
  admin.masterDataSyncRequest:
    properties:
      region:
        type: string
    type: object
  masterdata.Source:
    properties:
      owner:
        type: string
      path:
        type: string
      ref:
        type: string
      region:
        type: string
      repo:
        type: string
    type: object
  masterdata.SyncStatus:
    properties:
      error_message:
        type: string
      file_count:
        type: integer
      last_synced_at:
        type: string
      region:
        type: string
      source:
        $ref: '#/definitions/masterdata.Source'
      source_commit:
        type: string
      status:
        type: string
      sync_duration_ms:
        type: integer
      updated_at:
        type: string
    type: object
  shared.CardListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/shared.CardObjectResponse'
        type: array
      pagination:
        $ref: '#/definitions/shared.CardPagination'
    type: object
  shared.CardObjectResponse:
    properties:
      archivePublishedAt: {}
      assetbundleName: {}
      attr: {}
      cardParameters: {}
      cardRarity:
        $ref: '#/definitions/shared.CardRarityResponse'
      cardSkillName: {}
      cardSupply:
        $ref: '#/definitions/shared.CardSupplyResponse'
      character:
        $ref: '#/definitions/shared.CharacterResponse'
      flavorText: {}
      gachaPhrase: {}
      id: {}
      initialSpecialTrainingStatus: {}
      prefix: {}
      releaseAt: {}
      seq: {}
      skill:
        $ref: '#/definitions/shared.SkillResponse'
      specialTrainingPower1BonusFixed: {}
      specialTrainingPower2BonusFixed: {}
      specialTrainingPower3BonusFixed: {}
      supportUnit: {}
    type: object
  shared.CardPagination:
    properties:
      has_next:
        type: boolean
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  shared.CardRarityResponse:
    additionalProperties: {}
    type: object
  shared.CardSupplyResponse:
    additionalProperties: {}
    type: object
  shared.CharacterResponse:
    additionalProperties: {}
    type: object
  shared.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  shared.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/shared.ErrorBody'
    type: object
  shared.HealthResponse:
    properties:
      database:
        type: string
      status:
        type: string
    type: object
  shared.MasterDataAdminStatusResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/masterdata.SyncStatus'
        type: array
      regions:
        items:
          type: string
        type: array
      status:
        type: string
      sync_running:
        type: boolean
    type: object
  shared.MasterDataSyncResponse:
    properties:
      items:
        items:
