        type: array
      regions:
        items:
          type: string
        type: array
      status:
        type: string
      sync_running:
        type: boolean
    type: object
  shared.MasterDataVersionsResponse:
    properties:
      appVersion:
        example: 3.2.1
        type: string
      assetVersion:
        example: "20260423"
        type: string
      dataVersion:
        example: "20260423"
        type: string
    type: object
  shared.ProfileAuthDebug:
    properties:
      admin_claim:
        type: string
      claim_values:
        items:
          type: string
        type: array
      matched_values:
        items:
          type: string
        type: array
    type: object
  shared.ProfileResponse:
    properties:
      auth_debug:
        $ref: '#/definitions/shared.ProfileAuthDebug'
      user:
        $ref: '#/definitions/shared.ProfileUser'
    type: object
  shared.ProfileUser:
    properties:
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  shared.SkillResponse:
    additionalProperties: {}
    type: object
info:
  contact: {}
  description: API for master data sync and card querying.
  title: sekai-master-api
  version: "1.0"
paths:
  /admin/login:
    get:
      responses:
        "302":
          description: Redirect to OIDC authorization endpoint
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Start admin login with OIDC provider
      tags:
      - admin
  /admin/master-data/events:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Subscribe master-data sync events
      tags:
      - admin
  /admin/master-data/status:
    get:
      produces:
