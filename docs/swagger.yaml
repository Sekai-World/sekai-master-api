basePath: /api/v1
definitions:
  handler.AdminLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handler.AdminLoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
    type: object
  handler.CardListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/handler.CardObjectResponse'
        type: array
      pagination:
        $ref: '#/definitions/handler.CardPagination'
    type: object
  handler.CardObjectResponse:
    properties:
      archivePublishedAt: {}
      assetbundleName: {}
      attr: {}
      cardParameters: {}
      cardRarity:
        $ref: '#/definitions/handler.CardRarityResponse'
      cardSkillName: {}
      cardSupply:
        $ref: '#/definitions/handler.CardSupplyResponse'
      character:
        $ref: '#/definitions/handler.CharacterResponse'
      flavorText: {}
      gachaPhrase: {}
      id: {}
      initialSpecialTrainingStatus: {}
      prefix: {}
      releaseAt: {}
      seq: {}
      skill:
        $ref: '#/definitions/handler.SkillResponse'
      specialTrainingPower1BonusFixed: {}
      specialTrainingPower2BonusFixed: {}
      specialTrainingPower3BonusFixed: {}
      supportUnit: {}
    type: object
  handler.CardPagination:
    properties:
      has_next:
        type: boolean
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handler.CardRarityResponse:
    additionalProperties: {}
    type: object
  handler.CardSupplyResponse:
    additionalProperties: {}
    type: object
  handler.CharacterResponse:
    additionalProperties: {}
    type: object
  handler.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  handler.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/handler.ErrorBody'
    type: object
  handler.HealthResponse:
    properties:
      database:
        type: string
      status:
        type: string
    type: object
  handler.MasterDataStatusListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/masterdata.SyncStatus'
        type: array
    type: object
  handler.MasterDataSyncResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/masterdata.SyncStatus'
        type: array
      status:
        type: string
    type: object
  handler.ProfileResponse:
    properties:
      user:
        $ref: '#/definitions/handler.ProfileUser'
    type: object
  handler.ProfileUser:
    properties:
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  handler.SkillResponse:
    additionalProperties: {}
    type: object
  handler.masterDataSyncRequest:
    properties:
      region:
        type: string
    type: object
  masterdata.Source:
    properties:
      owner:
        type: string
      path:
        type: string
      ref:
        type: string
      region:
        type: string
      repo:
        type: string
    type: object
  masterdata.SyncStatus:
    properties:
      error_message:
        type: string
      file_count:
        type: integer
      last_synced_at:
        type: string
      region:
        type: string
      source:
        $ref: '#/definitions/masterdata.Source'
      source_commit:
        type: string
      status:
        type: string
      sync_duration_ms:
        type: integer
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: API for master data sync and card querying.
  title: sekai-master-api
  version: "1.0"
paths:
  /admin/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/handler.AdminLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AdminLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Login with Keycloak credentials
      tags:
      - admin
  /admin/master-data/sync:
    post:
      parameters:
      - description: Optional region-scoped sync payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/handler.masterDataSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MasterDataSyncResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger master-data sync
      tags:
      - admin
  /admin/master-data/sync/force:
    post:
      parameters:
      - description: Optional region-scoped force sync payload
        in: body
        name: payload
        schema:
          $ref: '#/definitions/handler.masterDataSyncRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MasterDataSyncResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger force master-data sync
      tags:
      - admin
  /admin/profile:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.ProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get admin profile
      tags:
      - admin
  /cards/{region}/{id}:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Card ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CardObjectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get card basic info by id
      tags:
      - cards
  /cards/{region}/{id}/episodes:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Card ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CardListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get card episodes by card id
      tags:
      - cards
  /cards/{region}/{id}/params:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Card ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CardObjectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get card params by id
      tags:
      - cards
  /cards/{region}/list:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CardListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: List cards by page
      tags:
      - cards
  /cards/{region}/search:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Prefix query
        in: query
        name: q
        required: true
        type: string
      - description: Search field (name|skill), default=name
        in: query
        name: field
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Max results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CardListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Search cards by prefix
      tags:
      - cards
  /events/{region}/{id}:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get event basic info by id
      tags:
      - events
  /events/{region}/{id}/rewards:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get event rewards by id
      tags:
      - events
  /events/{region}/current:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get current event by region
      tags:
      - events
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Get health status
      tags:
      - system
  /master-data/events:
    get:
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Subscribe master-data sync events
      tags:
      - master-data
  /master-data/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MasterDataStatusListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get master-data sync status
      tags:
      - master-data
  /musics/{region}/{id}:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Music ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Get music by id
      tags:
      - musics
  /musics/{region}/list:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: List musics by page
      tags:
      - musics
  /musics/{region}/search:
    get:
      parameters:
      - description: Region
        in: path
        name: region
        required: true
        type: string
      - description: Keyword for title field
        in: query
        name: title
        type: string
      - description: Keyword for lyricist field
        in: query
        name: lyricist
        type: string
      - description: Keyword for composer field
        in: query
        name: composer
        type: string
      - description: Keyword for arranger field
        in: query
        name: arranger
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Max results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: Search musics
      tags:
      - musics
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
