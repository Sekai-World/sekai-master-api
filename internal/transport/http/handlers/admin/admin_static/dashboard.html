<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sekai Admin Dashboard</title>
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body class="admin-bg">
    <header class="topbar">
      <div>
        <h1>Admin Dashboard</h1>
        <p>仅用于管理端权限校验与状态查看</p>
      </div>
      <div class="topbar-actions">
        <a id="swagger-debug-link" class="topbar-link" href="/docs/index.html" target="_blank" rel="noopener noreferrer" hidden>Swagger 调试</a>
        <button id="logout">退出登录</button>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="panel">
        <h2>服务状态</h2>
        <div id="health-view" class="profile-card">加载中...</div>
      </section>

      <section class="panel">
        <h2>当前管理员信息</h2>
        <div id="profile-view" class="profile-card">加载中...</div>
      </section>

      <section class="panel panel-wide">
        <div class="panel-header">
          <h2>Master Data 同步</h2>
          <div class="sync-actions">
            <label class="sync-force-toggle" for="sync-region-select">
              地区
              <select id="sync-region-select">
                <option value="">全部地区</option>
              </select>
            </label>
            <label class="sync-force-toggle" for="sync-force-checkbox">
              <input id="sync-force-checkbox" type="checkbox" />
              强制更新
            </label>
            <button id="sync-master-data-button">立即同步</button>
          </div>
        </div>
        <div id="sync-message" class="sync-message"></div>
        <div class="sync-progress-panel">
          <div class="sync-progress-title">最近进度</div>
          <div id="sync-progress-view" class="sync-progress-list">暂无同步进度</div>
        </div>
        <div id="master-data-status-view" class="master-data-status-list">加载中...</div>
      </section>
    </main>

    <script type="module" src="/admin/assets/dashboard-page.js?v=20260410"></script>
  </body>
</html>
