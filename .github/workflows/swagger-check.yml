name: Swagger Check

on:
  pull_request:

jobs:
  swagger:
    name: Check Swagger Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Regenerate Swagger docs
        run: mise run swagger

      - name: Verify generated docs are committed
        run: |
          git diff --quiet -- docs || {
            echo "Swagger docs are out of date. Run 'mise run swagger' and commit updated files.";
            git --no-pager diff -- docs;
            exit 1;
          }
