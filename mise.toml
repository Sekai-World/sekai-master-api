[tools]
go = "1.26.5"

[tasks.run]
description = "Run the API on the host"
run = "go run -buildvcs=false ./cmd/api"

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.format]
description = "Format Go files"
run = "gofmt -w $(find . -type f -name '*.go' -not -path './vendor/*')"

[tasks.lint]
description = "Check gofmt and go vet"
run = '''
UNFORMATTED="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
if [ -n "$UNFORMATTED" ]; then
  echo "The following files are not gofmt-formatted:"
  echo "$UNFORMATTED"
  exit 1
fi
go vet ./...
'''

[tasks.swagger]
description = "Regenerate Swagger docs"
run = "go run -buildvcs=false github.com/swaggo/swag/cmd/swag@v1.8.12 init -g main.go -d cmd/api,internal/transport/http/handlers/admin,internal/transport/http/handlers/cards,internal/transport/http/handlers/events,internal/transport/http/handlers/gachas,internal/transport/http/handlers/lookups,internal/transport/http/handlers/musics,internal/transport/http/handlers/shared,internal/transport/http/handlers/system,internal/transport/http/handlers/virtuallives,internal/domain/masterdata -o internal/transport/http/swaggerdocs"

[tasks.admin-open]
description = "Open the local admin login page"
run = '''
url="http://localhost:${APP_PORT:-18080}/admin/login"
browser_cmd="${BROWSER:-}"
if [ -n "$browser_cmd" ]; then
  "$browser_cmd" "$url"
elif command -v open >/dev/null 2>&1; then
  open "$url"
elif command -v xdg-open >/dev/null 2>&1; then
  xdg-open "$url"
else
  echo "No browser launcher found. Set BROWSER to your browser command." >&2
  exit 1
fi
'''

[tasks.dev-logs-ui]
description = "Open the local Grafana UI"
run = '''
url="${DEV_GRAFANA_URL:-http://grafana.sekai-master-api.orb.local}"
browser_cmd="${BROWSER:-}"
if [ -n "$browser_cmd" ]; then
  "$browser_cmd" "$url"
elif command -v open >/dev/null 2>&1; then
  open "$url"
elif command -v xdg-open >/dev/null 2>&1; then
  xdg-open "$url"
else
  echo "No browser launcher found. Set BROWSER to your browser command." >&2
  exit 1
fi
'''

[tasks.run-standalone]
description = "Run the monolithic standalone API role (public + admin) on APP_PORT (default 18080)"
run = "go run -buildvcs=false ./cmd/api standalone"

[tasks.run-serve]
description = "Run the public read/query role (no admin UI/API, no migrations/sync) on APP_PORT_SERVE (default 18080)"
run = "APP_PORT=${APP_PORT_SERVE:-18080} go run -buildvcs=false ./cmd/api serve"

[tasks.run-control]
description = "Run the operational/admin role (admin UI/API, migrations/sync; no public queries) on APP_PORT_CONTROL (default 18081)"
run = "APP_PORT=${APP_PORT_CONTROL:-18081} go run -buildvcs=false ./cmd/api control"

[tasks.dev-split]
description = "Run the split serve + control roles locally with the dev dependency stack"
run = '''
mise run --skip-tools dev-env-up
mise run --skip-tools run-serve &
serve_pid=$!
mise run --skip-tools run-control &
control_pid=$!

cleanup() {
  kill "$serve_pid" "$control_pid" 2>/dev/null || true
}
trap cleanup EXIT INT TERM

wait "$serve_pid" "$control_pid"
'''
